<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Study Basket</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">CampusHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/notes}">Notes</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/courses}">Courses</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/sessions}">Timetable</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/students}">Students</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/basket}">Study Basket</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-3">Study Basket</h1>

    <p th:if="${student != null}">
        Basket for <strong th:text="${student.fullName}">Student Name</strong>
    </p>
    <p th:if="${student == null}" class="text-muted">
        No current student selected.
    </p>

    <div th:if="${#lists.isEmpty(items)}" class="alert alert-info">
        No items in your basket yet.
    </div>

    <table th:if="${!#lists.isEmpty(items)}"
           class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>Note Title</th>
            <th>Type</th>
            <th>Added At</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="it : ${items}">
            <td th:text="${it.note.title}">Note title</td>
            <td th:text="${it.note.type}">NOTE</td>
            <td th:text="${it.addedAt}">2026-03-26T23:59</td>
            <td th:text="${it.status}">PLANNED</td>
            <td>
                <span th:if="${it.status == T(tr.gedik.campushub.GedikCampusHub.model.StudyStatus).PLANNED}">
                    <a th:href="@{|/basket/${it.id}/start|}" class="btn btn-sm btn-outline-primary">Start</a>
                </span>
                <span th:if="${it.status == T(tr.gedik.campushub.GedikCampusHub.model.StudyStatus).IN_PROGRESS}">
                    <a th:href="@{|/basket/${it.id}/complete|}" class="btn btn-sm btn-outline-success">Mark done</a>
                </span>
                <a th:href="@{|/basket/${it.id}/remove|}" class="btn btn-sm btn-outline-danger ms-1">Remove</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
