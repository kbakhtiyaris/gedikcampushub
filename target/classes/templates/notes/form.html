<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${note.id} == null ? 'New Note' : 'Edit Note'">Note</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">CampusHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" th:href="@{/notes}">Notes</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/courses}">Courses</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/sessions}">Timetable</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/students}">Students</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/basket}">Study Basket</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-3" th:text="${note.id} == null ? 'New Note' : 'Edit Note'">Note</h1>

    <a th:href="@{/notes}" class="btn btn-secondary mb-3">Back to list</a>

    <!-- if you use file upload, keep enctype; else you can remove it -->
    <form th:action="@{/notes}" th:object="${note}" method="post"
          enctype="multipart/form-data" class="card card-body">

        <input type="hidden" th:if="${note.id != null}" th:field="*{id}"/>

        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input id="title" type="text" th:field="*{title}"
                   class="form-control" required/>
        </div>

        <div class="mb-3">
            <label for="type" class="form-label">Type</label>
            <select id="type" th:field="*{type}" class="form-select">
                <option th:each="t : ${types}"
                        th:value="${t}"
                        th:text="${t}">
                    NOTE
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="courseId" class="form-label">Course (optional)</label>
            <select id="courseId" name="courseId" class="form-select">
                <option value="">No course</option>
                <option th:each="course : ${courses}"
                        th:value="${course.id}"
                        th:text="${course.code + ' - ' + course.name}"
                        th:selected="${note.course != null and note.course.id == course.id}">
                    MECH201 - Kinematics
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="content" class="form-label">Content</label>
            <textarea id="content" th:field="*{content}" rows="5"
                      class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label for="file" class="form-label">Attach file (PDF/Image)</label>
            <input id="file" type="file" name="file" accept=".pdf,.doc,.docx,image/*"
                   class="form-control"/>
            <small class="form-text text-muted">Optional: attach past paper or note file</small>
        </div>

        <button type="submit" class="btn btn-primary">Save Note</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
