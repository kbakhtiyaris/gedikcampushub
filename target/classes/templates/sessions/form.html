<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${classSession.id} == null ? 'New Session' : 'Edit Session'">Session</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">CampusHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/notes}">Notes</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/courses}">Courses</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/sessions}">Timetable</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/students}">Students</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/basket}">Study Basket</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-3" th:text="${classSession.id} == null ? 'New Session' : 'Edit Session'">Session</h1>

    <a th:href="@{/sessions}" class="btn btn-secondary mb-3">Back to timetable</a>

    <form th:action="@{/sessions}" method="post" class="card card-body">

        <input type="hidden" name="id" th:value="${classSession.id}" />

        <div class="mb-3">
            <label for="dayOfWeek" class="form-label">Day of Week</label>
            <select id="dayOfWeek" name="dayOfWeek" required class="form-select">
                <option value="" th:if="${classSession.dayOfWeek} == null" selected>Select a day</option>
                <option th:each="day : ${daysOfWeek}"
                        th:value="${day}"
                        th:text="${day}"
                        th:selected="${classSession.dayOfWeek} == day">
                    MONDAY
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="courseId" class="form-label">Course</label>
            <select id="courseId" name="courseId" required class="form-select">
                <option value="" th:if="${classSession.course} == null" selected>Select a course</option>
                <option th:each="course : ${courses}"
                        th:value="${course.id}"
                        th:text="${course.code + ' - ' + course.name}"
                        th:selected="${classSession.course != null and classSession.course.id == course.id}">
                    MECH201 - Kinematics
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="startTime" class="form-label">Start Time</label>
            <input id="startTime" type="time" name="startTime"
                   th:value="${classSession.startTime}"
                   class="form-control" required/>
        </div>

        <div class="mb-3">
            <label for="endTime" class="form-label">End Time</label>
            <input id="endTime" type="time" name="endTime"
                   th:value="${classSession.endTime}"
                   class="form-control" required/>
        </div>

        <div class="mb-3">
            <label for="classroom" class="form-label">Classroom</label>
            <input id="classroom" type="text" name="classroom"
                   th:value="${classSession.classroom}"
                   class="form-control" required/>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
