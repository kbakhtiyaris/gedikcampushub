<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${student.id} == null ? 'New Student' : 'Edit Student'">Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">CampusHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/notes}">Notes</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/courses}">Courses</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/sessions}">Timetable</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/students}">Students</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/basket}">Study Basket</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-3" th:text="${student.id} == null ? 'New Student' : 'Edit Student'">Student</h1>

    <a th:href="@{/students}" class="btn btn-secondary mb-3">Back to list</a>

    <form th:action="@{/students}" th:object="${student}" method="post" class="card card-body">

        <input type="hidden" th:if="${student.id != null}" th:field="*{id}"/>



        <div class="mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input id="fullName" type="text" th:field="*{fullName}"
                   class="form-control" required/>
            <div th:if="${#fields.hasErrors('fullName')}" class="text-danger">
                <small th:errors="*{fullName}">Error message</small>
            </div>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" type="email" th:field="*{email}"
                   class="form-control" required/>
            <div th:if="${#fields.hasErrors('fullName')}" class="text-danger">
                <small th:errors="*{fullName}">Error message</small>
            </div>
        </div>

        <div class="mb-3">
            <label for="department" class="form-label">Department</label>
            <input id="department" type="text" th:field="*{department}"
                   class="form-control"/>
            <div th:if="${#fields.hasErrors('fullName')}" class="text-danger">
                <small th:errors="*{fullName}">Error message</small>
            </div>
        </div>

        <div class="mb-3">
            <label for="studyYear" class="form-label">Study Year</label>
            <input id="studyYear" type="number" th:field="*{studyYear}"
                   min="1" max="6" class="form-control"/>
            <div th:if="${#fields.hasErrors('fullName')}" class="text-danger">
                <small th:errors="*{fullName}">Error message</small>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
