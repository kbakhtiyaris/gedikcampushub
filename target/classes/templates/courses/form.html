<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${course.id} == null ? 'New Course' : 'Edit Course'">Course</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">CampusHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/notes}">Notes</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/courses}">Courses</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/sessions}">Timetable</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/students}">Students</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/basket}">Study Basket</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h1 class="mb-3" th:text="${course.id} == null ? 'New Course' : 'Edit Course'">Course</h1>

    <form th:action="@{/courses}" th:object="${course}" method="post" class="card card-body">

        <input type="hidden" th:if="${course.id != null}" th:field="*{id}"/>

        <!-- COURSE FIELDS ONLY -->
        <div class="mb-3">
            <label for="code" class="form-label">Code</label>
            <input id="code" type="text" th:field="*{code}" class="form-control" required/>
            <div th:if="${#fields.hasErrors('code')}" class="text-danger">
                <small th:errors="*{code}">Error</small>
            </div>
        </div>

        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input id="name" type="text" th:field="*{name}" class="form-control" required/>
            <div th:if="${#fields.hasErrors('name')}" class="text-danger">
                <small th:errors="*{name}">Error</small>
            </div>
        </div>

        <div class="mb-3">
            <label for="department" class="form-label">Department</label>
            <input id="department" type="text" th:field="*{department}" class="form-control"/>
            <div th:if="${#fields.hasErrors('department')}" class="text-danger">
                <small th:errors="*{department}">Error</small>
            </div>
        </div>

        <div class="mb-3">
            <label for="studyYear" class="form-label">Study Year</label>
            <input id="studyYear" type="number" th:field="*{studyYear}" min="1" max="6" class="form-control"/>
            <div th:if="${#fields.hasErrors('studyYear')}" class="text-danger">
                <small th:errors="*{studyYear}">Error</small>
            </div>
        </div>

        <div class="mb-3">
            <label for="semester" class="form-label">Semester</label>
            <input id="semester" type="text" th:field="*{semester}" class="form-control"/>
            <div th:if="${#fields.hasErrors('semester')}" class="text-danger">
                <small th:errors="*{semester}">Error</small>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
