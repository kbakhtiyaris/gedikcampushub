<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Courses</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">CampusHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/notes}">Notes</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/courses}">Courses</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/sessions}">Timetable</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/students}">Students</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/basket}">Study Basket</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-3">Courses</h1>

    <a th:href="@{/courses/new}" class="btn btn-primary mb-3">+ New Course</a>

    <div th:if="${#lists.isEmpty(courses)}" class="alert alert-info">
        No courses yet.
    </div>

    <table th:if="${!#lists.isEmpty(courses)}"
           class="table table-striped table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>Id</th>
            <th>Code</th>
            <th>Name</th>
            <th>Department</th>
            <th>Study Year</th>
            <th>Semester</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="course : ${courses}">
            <td th:text="${course.id}">1</td>
            <td th:text="${course.code}">MECH201</td>
            <td th:text="${course.name}">Kinematics</td>
            <td th:text="${course.department}">Mechatronics</td>
            <td th:text="${course.studyYear}">3</td>
            <td th:text="${course.semester}">Fall</td>
            <td>
                <a th:href="@{|/courses/${course.id}/edit|}" class="btn btn-sm btn-outline-secondary">Edit</a>
                <a th:href="@{|/courses/${course.id}/delete|}" class="btn btn-sm btn-outline-danger ms-1">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
