version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: campushub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gedikcampushub
      MYSQL_USER: campususer
      MYSQL_PASSWORD: campus123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: campushub-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gedikcampushub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: campususer
      SPRING_DATASOURCE_PASSWORD: campus123
    depends_on:
      - mysql

volumes:
  mysql_data: